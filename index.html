<!doctype html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Scary Ball Game - 10 Cheats Edition</title>
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; transition: background 1.5s ease; }  
        
        .normal-mode {
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scary-mode-10 { background: #2b0000 !important; }
        .scary-mode-20 { background: #0a0000 !important; }
        .scary-mode-30 { background: #000000 !important; animation: screenShake 0.5s infinite alternate; }

        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(-0.5deg); }
        }

        canvas {
            display: block;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: filter 1.5s ease;
            touch-action: none;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            padding: 12px 25px;
            font-size: 15px;
            color: #fff;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            z-index: 10;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .online-counter {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            color: #28a745;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(40, 167, 69, 0.6);
        }

        .online-dot { width: 8px; height: 8px; background-color: #28a745; border-radius: 50%; animation: pulseDot 2s infinite; }
        @keyframes pulseDot { 0%, 100% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

        .combo-box {
            background: rgba(255, 193, 7, 0.2); border: 1px solid #ffc107; padding: 4px 12px;
            border-radius: 20px; color: #ffc107; font-weight: bold; display: none; text-shadow: 0 0 10px #ffc107;
        }

        .lives-box { color: #ff4757; font-weight: bold; display: none; }

        button, select, input[type="text"] {
            padding: 6px 14px; border: none; border-radius: 20px;
            background: #28a745; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .btn-blue { background: #007bff; }
        .btn-purple { background: #6f42c1; }
        select { background: #333; border: 1px solid #555; }
        
        input[type="text"] {
            background: #222; border: 1px solid #444; color: #ffc107; text-align: center;
            font-family: monospace; width: 140px; cursor: text;
        }
        input[type="text"]::placeholder { color: #666; }

        .footer-bar {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; align-items: center;
            background: rgba(0, 0, 0, 0.5); padding: 6px 20px; border-radius: 20px;
            backdrop-filter: blur(5px); z-index: 5; transition: all 0.3s ease;
        }

        .dev-credit { font-size: 14px; font-weight: bold; color: rgba(255, 255, 255, 0.6); }

        .stats-inline {
            display: none; font-family: monospace; font-size: 12px; color: #00ffcc;
            border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px;
        }

        @keyframes scaryBlink {
            0%, 100% { opacity: 0.2; text-shadow: 0 0 5px #ff0000; }
            50% { opacity: 1; text-shadow: 0 0 20px #ff0000; }
        }

        .popup-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: #fff;
        }
        .popup-content {
            background: #151515; padding: 30px; border-radius: 20px; text-align: center;
            border: 2px solid rgba(255,255,255,0.15); min-width: 380px;
        }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }

        .shop-items { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .shop-btn { background: #252525; padding: 12px; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; cursor: pointer; }
        .shop-btn.active { border-color: #ffc107; background: #353535; }

        .backgroundText { position: absolute; color: red; font-size: 40px; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 2s ease; }
    </style>
</head>
<body class="normal-mode">

<div class="hud">
    <div class="online-counter"><span class="online-dot"></span><span>500K أونلاين</span></div>
    
    <div>
        <label>الطور: </label>
        <select id="gameModeSelect">
            <option value="classic">الكلاسيكي</option>
            <option value="survival">البقاء ❤️</option>
        </select>
    </div>

    <div id="livesDisplay" class="lives-box">❤️ ❤️ ❤️</div>
    <div id="comboDisplay" class="combo-box">X1 Combo</div>
    
    <span>النقاط: <span id="score">0</span></span>
    <span>أعلى نقاط: <span id="highScore">0</span></span>
    <span>المرحلة: <span id="level">1</span></span>
    
    <button id="pauseBtn">⏸️</button>
    <button id="openShopBtn" class="btn-blue">🛒 المتجر</button>
    <button id="openSettingsBtn" class="btn-purple">⚙️</button>
</div>

<div id="footerBar" class="footer-bar">
    <div id="developerCredit" class="dev-credit">Developed by: @axssalah-arch</div>
    <div id="statsInline" class="stats-inline">
        FPS: <span id="fpsVal" style="margin-right: 10px;">60</span>
        SPEED: <span id="speedVal">0.0</span> px
    </div>
</div>

<div id="text1" class="backgroundText" style="top:25%; left:10%;">رح تموت وأنت حي!</div>
<div id="text2" class="backgroundText" style="top:55%; left:65%;">لن تخرج من هنا…</div>

<div id="settingsScreen" class="popup-screen">
    <div class="popup-content">
        <h2>⚙️ الإعدادات المتقدمة</h2>
        
        <div class="setting-row">
            <label>🎚️ مستوى الصوت:</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
        </div>
        
        <div class="setting-row">
            <label>🏓 لون المضرب:</label>
            <select id="paddleColorSelect">
                <option value="#007bff">الأزرق</option>
                <option value="#28a745">الأخضر</option>
                <option value="#6f42c1">البنفسجي</option>
                <option value="#ffc107">الذهبي</option>
            </select>
        </div>

        <div class="setting-row">
            <label>📊 عداد الأداء (FPS & Speed):</label>
            <select id="statsToggleSelect">
                <option value="off">إيقاف</option>
                <option value="on">تشغيل</option>
            </select>
        </div>

        <div class="setting-row" style="border: 1px dashed #ffc107; background: rgba(255, 193, 7, 0.05);">
            <label style="color: #ffc107;">🔑 أدخل كود سري (Cheat):</label>
            <input type="text" id="cheatCodeInput" placeholder="اكتب الكود هنا..." autocomplete="off">
        </div>
        
        <br>
        <button id="closeSettingsBtn" style="background:#28a745; width: 100%;">حفظ وإغلاق</button>
    </div>
</div>

<div id="shopScreen" class="popup-screen">
    <div class="popup-content">
        <h2>🛒 متجر الكرات الأسطوري</h2>
        <div class="shop-items">
            <button class="shop-btn active" data-ball="yellow">🟡 المظهر الكلاسيكي</button>
            <button class="shop-btn" data-ball="football">⚽ كرة قدم</button>
            <button class="shop-btn" data-ball="basketball">🏀 كرة سلة</button>
            <button class="shop-btn" data-ball="fire">🔥 كرة التنين</button>
            <button class="shop-btn" data-ball="lightning">⚡ كرة البرق</button>
        </div>
        <br>
        <button id="closeShopBtn" style="background:#dc3545; width: 100%;">العودة</button>
    </div>
</div>

<div id="endScreen" class="popup-screen">
    <div class="popup-content" style="border-color: #ff0000; background: #0a0000;">
        <h1 id="deathTitle">انتهت اللعبة!</h1>
        <div style="font-size: 22px; margin: 12px 0;">النقاط: <span id="finalScore">0</span></div>
        <div style="font-size: 22px; margin-bottom: 25px;">المرحلة: <span id="finalLevel">1</span></div>
        <button id="playAgainBtn" style="background:#ff0000; font-size:20px; padding:12px 35px; border-radius: 30px;">إعادة اللعب</button>
    </div>
</div>

<canvas id="game" width="700" height="500"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const levelEl = document.getElementById('level');
    const comboDisplay = document.getElementById('comboDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const gameModeSelect = document.getElementById('gameModeSelect');
    const endScreen = document.getElementById('endScreen');
    const shopScreen = document.getElementById('shopScreen');
    const settingsScreen = document.getElementById('settingsScreen');
    const volumeSlider = document.getElementById('volumeSlider');
    const paddleColorSelect = document.getElementById('paddleColorSelect');
    const statsToggleSelect = document.getElementById('statsToggleSelect');
    const cheatCodeInput = document.getElementById('cheatCodeInput');
    const footerBar = document.getElementById('footerBar');
    const statsInline = document.getElementById('statsInline');
    const fpsVal = document.getElementById('fpsVal');
    const speedVal = document.getElementById('speedVal');
    const devCreditEl = document.getElementById('developerCredit');
    
    let W = canvas.width, H = canvas.height;
    let score = 0, level = 1, running = true, paused = false;
    let highScore = localStorage.getItem('ballGameHighScore') || 0;
    highScoreEl.textContent = highScore;

    let comboCount = 0, comboMultiplier = 1;
    let gameMode = 'classic', lives = 3;
    let currentBallStyle = 'yellow', ballTrail = [];

    // متغيرات مخصصة للأكواد
    let paddleOpacity = 1.0;
    let isRainbowPaddle = false;
    let rainbowHue = 0;

    const ball = { x: W / 2, y: H / 2, r: 14, baseR: 14, vx: 3.5, vy: 3.5 };
    const paddle = { x: W / 2 - 57, y: H - 30, w: 115, baseW: 115, h: 12, color: '#007bff' };
    let keys = {};

    let lastCalledTime;
    let fps;

    let globalVolume = 0.5;
    const gentleMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"); gentleMusic.loop = true;
    const scaryMusic = new Audio("https://actions.google.com/sounds/v1/ambiences/ambient_hum_air_conditioner.ogg"); scaryMusic.loop = true;
    const hitSound = new Audio("https://actions.google.com/sounds/v1/digital/beep.ogg");
    const loseSound = new Audio("https://actions.google.com/sounds/v1/horror/creepy_slither.ogg");

    function updateAudioVolumes() {
        gentleMusic.volume = globalVolume * 0.3; scaryMusic.volume = globalVolume * 0.5;   
        hitSound.volume = globalVolume * 0.4; loseSound.volume = globalVolume * 0.7;
    }

    function manageMusic() {
        if (!running || paused || globalVolume === 0) { gentleMusic.pause(); scaryMusic.pause(); return; }
        if (level >= 10) { gentleMusic.pause(); scaryMusic.play().catch(() => {}); } 
        else { scaryMusic.pause(); gentleMusic.play().catch(() => {}); }
    }

    let particles = [];
    function createParticles() {
        particles = [];
        let count = level >= 30 ? 100 : (level >= 20 ? 70 : (level >= 10 ? 45 : 15));
        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * W, y: Math.random() * H,
                radius: Math.random() * (level >= 20 ? 50 : 20) + 15,
                alpha: Math.random() * 0.1 + 0.03,
                speed: Math.random() * (level >= 30 ? 1.5 : 0.4) + 0.1
            });
        }
    }

    function drawParticles() {
        for (let p of particles) {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            if (level >= 30) ctx.fillStyle = `rgba(100, 0, 0, ${p.alpha * 1.5})`;
            else if (level >= 20) ctx.fillStyle = `rgba(30, 0, 50, ${p.alpha})`;
            else if (level >= 10) ctx.fillStyle = `rgba(220, 0, 0, ${p.alpha})`;
            else ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
            ctx.fill(); p.y -= p.speed;
            if (p.y + p.radius < 0) { p.y = H + p.radius; p.x = Math.random() * W; }
        }
    }

    function reset() {
        ball.x = W / 2; ball.y = H / 2;
        ball.vx = 4; ball.vy = -4; ball.r = ball.baseR;
        score = 0; level = 1; comboCount = 0; comboMultiplier = 1;
        paddle.w = paddle.baseW; paddleOpacity = 1.0; isRainbowPaddle = false;
        scoreEl.textContent = score; levelEl.textContent = level;
        comboDisplay.style.display = "none"; ballTrail = [];
        
        gameMode = gameModeSelect.value;
        if (gameMode === 'survival') { lives = 3; livesDisplay.style.display = "block"; updateLivesUI(); } 
        else { livesDisplay.style.display = "none"; }

        running = true; paused = false;
        document.body.className = "normal-mode"; canvas.style.filter = "none";
        document.getElementById('text1').style.opacity = 0; document.getElementById('text2').style.opacity = 0;
        
        footerBar.style.animation = "none"; footerBar.style.background = "rgba(0, 0, 0, 0.5)";
        devCreditEl.style.color = "rgba(255, 255, 255, 0.6)"; devCreditEl.textContent = "Developed by: @axssalah-arch";

        endScreen.style.display = "none"; shopScreen.style.display = "none"; settingsScreen.style.display = "none";
        updateAudioVolumes(); createParticles(); manageMusic();
    }

    function updateLivesUI() { livesDisplay.textContent = "❤️ ".repeat(lives); }
    
    function endGame() {
        running = false; gentleMusic.pause(); scaryMusic.pause();
        if (globalVolume > 0) loseSound.play().catch(() => {});
        if (score > highScore) { highScore = score; localStorage.setItem('ballGameHighScore', highScore); highScoreEl.textContent = highScore; }
        document.getElementById('finalScore').textContent = score; document.getElementById('finalLevel').textContent = level;
        endScreen.style.display = "flex";
    }

    function applyLevelVisuals() {
        levelEl.textContent = level;
        if (level >= 10 && level < 20) {
            document.body.className = "scary-mode-10";
            canvas.style.filter = "sepia(40%) saturate(180%) hue-rotate(330deg)";
            devCreditEl.textContent = "Nightmare Active... 😈";
            manageMusic();
        } else if (level >= 20 && level < 30) {
            document.body.className = "scary-mode-20";
            canvas.style.filter = "invert(10%) saturate(300%) contrast(120%) brightness(80%)";
            document.getElementById('text1').style.opacity = 0.4;
            devCreditEl.textContent = "DEMONIC MODE UNLOCKED ☠️"; devCreditEl.style.color = "#ff4757";
        } else if (level >= 30) {
            document.body.className = "scary-mode-30";
            canvas.style.filter = "grayscale(30%) contrast(150%) brightness(70%)";
            document.getElementById('text1').style.opacity = 0.8; document.getElementById('text2').style.opacity = 0.8;
            devCreditEl.textContent = "THE ULTIMATE NIGHTMARE 🔥👹"; devCreditEl.style.color = "#fff";
            footerBar.style.background = "red"; footerBar.style.animation = "scaryBlink 0.5s infinite";
        }
    }

    function checkLevel() {
        let oldLevel = level;
        level = Math.floor(score / 8) + 1;
        if (level > oldLevel) {
            ball.vx += 0.6 * Math.sign(ball.vx); ball.vy += 0.6 * Math.sign(ball.vy);
            createParticles(); applyLevelVisuals();
        }
    }

    // فحص نظام الـ 10 أكواد المرتبة بالكامل تلقائياً
    function checkCheatCode(code) {
        let cleanCode = code.trim().toUpperCase();
        
        switch(cleanCode) {
            case "GODMODE": // 1
                paddle.w = W - 40;
                alert("Code 1 [GODMODE]: تم تفعيل الطور الإلهي! المضرب عملاق! 🏓");
                break;
            case "AXS2026": // 2
                score = 240; scoreEl.textContent = score; level = 30; applyLevelVisuals();
                ball.vx = 8; ball.vy = -8; createParticles(); manageMusic();
                alert("Code 2 [AXS2026]: تم تشغيل مرحلة المطور الشيطانية الهائلة! 👹");
                break;
            case "SPEEDY": // 3
                ball.vx *= 2; ball.vy *= 2;
                alert("Code 3 [SPEEDY]: تم مضاعفة سرعة الكرة! تحدي الصاروخ! ⚡");
                break;
            case "SLOWMO": // 4
                ball.vx = Math.sign(ball.vx) * 2; ball.vy = Math.sign(ball.vy) * 2;
                alert("Code 4 [SLOWMO]: تم تبطيء سرعة الكرة بنجاح! ⏳");
                break;
            case "BIGBALL": // 5
                ball.r = ball.baseR * 2;
                alert("Code 5 [BIGBALL]: تم تكبير حجم الكرة مرتين! 🟡");
                break;
            case "MINIBALL": // 6
                ball.r = 6;
                alert("Code 6 [MINIBALL]: تم تصغير الكرة للحجم المجهري! 🎯");
                break;
            case "RICH": // 7
                score += 500; scoreEl.textContent = score; checkLevel();
                alert("Code 7 [RICH]: تم منحك 500 نقطة سكور مجانية! 💰");
                break;
            case "GHOST": // 8
                paddleOpacity = 0.1;
                alert("Code 8 [GHOST]: المضرب الآن شبه خفي! تحدي الشبح! 👻");
                break;
            case "HELLPADDLE": // 9
                paddle.color = "#ff0000"; isRainbowPaddle = false;
                alert("Code 9 [HELLPADDLE]: تغير لون المضرب للأحمر الدموي المتوهج! 🔥");
                break;
            case "RAINBOW": // 10
                isRainbowPaddle = true;
                alert("Code 10 [RAINBOW]: تم فتح مظهر قوس قزح المتغير للمضرب! 🌈");
                break;
            default:
                return; // إذا لم يطابق أي كود لا يفعل شيء
        }
        cheatCodeInput.value = ""; // تصفير الخانة بعد تفعيل الكود بنجاح
    }

    function update() {
        if (!lastCalledTime) { lastCalledTime = performance.now(); fps = 60; } 
        else {
            let delta = (performance.now() - lastCalledTime) / 1000;
            lastCalledTime = performance.now(); fps = Math.round(1 / delta);
        }
        if (statsToggleSelect.value === "on") {
            fpsVal.textContent = fps;
            let currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy).toFixed(1);
            speedVal.textContent = currentSpeed;
        }

        if (comboMultiplier > 1) {
            ballTrail.push({ x: ball.x, y: ball.y });
            if (ballTrail.length > 8) ballTrail.shift();
        } else { ballTrail = []; }

        ball.x += ball.vx; ball.y += ball.vy;

        if (ball.x < ball.r || ball.x > W - ball.r) {
            ball.vx *= -1; comboCount = 0; comboMultiplier = 1; comboDisplay.style.display = "none";
        }
        if (ball.y < ball.r) ball.vy *= -1;

        if (ball.y > H) {
            if (gameMode === 'survival' && lives > 1) {
                lives--; updateLivesUI(); ball.x = W / 2; ball.y = H / 2; ball.vy = -Math.abs(ball.vy);
                comboCount = 0; comboMultiplier = 1; comboDisplay.style.display = "none";
            } else { endGame(); }
        }

        if (ball.y + ball.r >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
            ball.vy *= -1; ball.y = paddle.y - ball.r;
            comboCount++;
            if (comboCount >= 9) { comboMultiplier = 5; comboDisplay.style.color = "#ff4757"; }
            else if (comboCount >= 5) { comboMultiplier = 3; comboDisplay.style.color = "#ffa500"; }
            else if (comboCount >= 2) { comboMultiplier = 2; comboDisplay.style.color = "#ffc107"; }

            if (comboMultiplier > 1) { comboDisplay.textContent = `X${comboMultiplier} Combo! 🔥`; comboDisplay.style.display = "block"; }

            score += 1 * comboMultiplier; scoreEl.textContent = score;
            if (globalVolume > 0) { hitSound.currentTime = 0; hitSound.play().catch(() => {}); }
            checkLevel();
        }

        if (keys['ArrowLeft'] || keys['a']) paddle.x -= 8.5;
        if (keys['ArrowRight'] || keys['d']) paddle.x += 8.5;
        paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

        // تحديث لون قوس قزح إذا كان الكود رقم 10 مفعل
        if (isRainbowPaddle) {
            rainbowHue = (rainbowHue + 2) % 360;
            paddle.color = `hsl(${rainbowHue}, 100%, 50%)`;
        }
    }

    function drawBall() {
        ctx.save();
        if (comboMultiplier > 1) {
            for (let i = 0; i < ballTrail.length; i++) {
                ctx.beginPath(); ctx.arc(ballTrail[i].x, ballTrail[i].y, ball.r * (i / ballTrail.length), 0, Math.PI * 2);
                let alpha = (i / ballTrail.length) * 0.4;
                ctx.fillStyle = comboMultiplier === 5 ? `rgba(255, 0, 0, ${alpha})` : `rgba(0, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }

        ctx.beginPath();
        if (level >= 20) {
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000'; ctx.fillStyle = '#111'; ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(ball.x, ball.y, 5, 0, Math.PI * 2); ctx.fill();
        } else {
            if (comboMultiplier > 1) { ctx.shadowBlur = 15; ctx.shadowColor = '#ffc107'; }
            if (currentBallStyle === 'yellow') {
                let grad = ctx.createRadialGradient(ball.x-3, ball.y-3, 2, ball.x, ball.y, ball.r);
                grad.addColorStop(0, '#fffb96'); grad.addColorStop(1, '#f1a80a'); ctx.fillStyle = grad; ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
            } else if (currentBallStyle === 'football') {
                ctx.fillStyle = '#fff'; ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(ball.x, ball.y - ball.r); ctx.lineTo(ball.x, ball.y + ball.r); ctx.stroke();
            } else if (currentBallStyle === 'basketball') {
                ctx.fillStyle = '#e65c00'; ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
            } else if (currentBallStyle === 'fire') {
                ctx.fillStyle = '#ff3300'; ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
            } else if (currentBallStyle === 'lightning') {
                ctx.fillStyle = '#00ffff'; ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
            }
        }
        ctx.restore();
    }

    function draw() {
        ctx.fillStyle = level >= 30 ? '#050000' : (level >= 20 ? '#0a000c' : (level >= 10 ? '#150000' : '#0f172a'));
        ctx.fillRect(0, 0, W, H);
        drawParticles(); drawBall();
        
        ctx.save();
        ctx.globalAlpha = paddleOpacity; // تطبيق الشفافية لكود الشبح
        if (level >= 20 && !isRainbowPaddle && paddle.color !== "#ff0000") { 
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000'; ctx.fillStyle = '#ff0000'; 
        } else { 
            ctx.fillStyle = paddle.color; 
        }
        ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
        ctx.restore();
    }

    function loop() { if (running && !paused) { update(); draw(); } requestAnimationFrame(loop); }

    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup', e => { delete keys[e.key]; });
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        paddle.x = e.clientX - rect.left - paddle.w / 2;
    });

    document.getElementById('pauseBtn').addEventListener('click', () => { paused = !paused; manageMusic(); });
    document.getElementById('openShopBtn').addEventListener('click', () => { paused = true; shopScreen.style.display = "flex"; });
    document.getElementById('closeShopBtn').addEventListener('click', () => { paused = false; shopScreen.style.display = "none"; });
    document.getElementById('openSettingsBtn').addEventListener('click', () => { paused = true; settingsScreen.style.display = "flex"; });
    
    document.getElementById('closeSettingsBtn').addEventListener('click', () => { 
        paused = false; 
        settingsScreen.style.display = "none"; 
        if(!isRainbowPaddle && paddle.color !== "#ff0000") paddle.color = paddleColorSelect.value;
        
        if (statsToggleSelect.value === "on") { statsInline.style.display = "inline-block"; } 
        else { statsInline.style.display = "none"; }

        // فحص الأكواد عند إغلاق الإعدادات
        if (cheatCodeInput.value !== "") { checkCheatCode(cheatCodeInput.value); }
    });

    document.getElementById('playAgainBtn').addEventListener('click', () => { reset(); });
    gameModeSelect.addEventListener('change', () => { reset(); });
    volumeSlider.addEventListener('input', (e) => { globalVolume = e.target.value / 100; updateAudioVolumes(); });

    document.querySelectorAll('.shop-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.shop-btn').forEach(b => b.classList.remove('active'));
            let target = e.target.closest('.shop-btn'); target.classList.add('active');
            currentBallStyle = target.getAttribute('data-ball');
        });
    });

    reset();
    loop();
</script>
</body>
</html>
